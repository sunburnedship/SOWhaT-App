<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO-WhaT Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg-page: #F4F6FB; --bg-elevated: #FFFFFF; --bg-subtle: #EEF1F7; --bg-hover: #E8ECF5;
  --border: #E1E5EE; --border-strong: #C9CFDD;
  --text-primary: #0B1430; --text-secondary: #4D5A78; --text-tertiary: #8190AD; --text-inverse: #FFFFFF;
  --brand: #3358FF; --brand-hover: #1E3FE0; --brand-active: #1530B8;
  --brand-soft: #E5EBFF; --brand-soft-hover: #D6DEFF;
  --strength: #047857; --strength-bg: #D1FAE5; --strength-border: #6EE7B7;
  --weakness: #B45309; --weakness-bg: #FEF3C7; --weakness-border: #FCD34D;
  --opportunity: #0369A1; --opportunity-bg: #DBEAFE; --opportunity-border: #93C5FD;
  --threat: #BE123C; --threat-bg: #FFE4E6; --threat-border: #FDA4AF;
  --success: #047857; --success-bg: #D1FAE5;
  --warning: #B45309; --warning-bg: #FEF3C7;
  --danger: #BE123C; --danger-bg: #FFE4E6;
  --shadow-sm: 0 1px 2px rgba(11,20,48,0.04), 0 1px 3px rgba(11,20,48,0.06);
  --shadow-md: 0 2px 4px rgba(11,20,48,0.04), 0 4px 12px rgba(11,20,48,0.08);
  --shadow-lg: 0 4px 8px rgba(11,20,48,0.06), 0 12px 32px rgba(11,20,48,0.12);
  --shadow-xl: 0 8px 16px rgba(11,20,48,0.08), 0 24px 64px rgba(11,20,48,0.16);
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
  --avatar-1-bg: #DBEAFE; --avatar-1-fg: #1E40AF;
  --avatar-2-bg: #FCE7F3; --avatar-2-fg: #9D174D;
  --avatar-3-bg: #D1FAE5; --avatar-3-fg: #065F46;
  --avatar-4-bg: #FEF3C7; --avatar-4-fg: #92400E;
  --avatar-5-bg: #E0E7FF; --avatar-5-fg: #3730A3;
  --avatar-6-bg: #FED7AA; --avatar-6-fg: #9A3412;
  --avatar-7-bg: #CFFAFE; --avatar-7-fg: #155E75;
  --avatar-8-bg: #FBCFE8; --avatar-8-fg: #831843;
  --avatar-9-bg: #DDD6FE; --avatar-9-fg: #5B21B6;
  --avatar-10-bg: #FECACA; --avatar-10-fg: #991B1B;
}
[data-theme="dark"] {
  --bg-page: #0B0E1A; --bg-elevated: #151A2B; --bg-subtle: #1F2640; --bg-hover: #2A3252;
  --border: #2A3252; --border-strong: #3A446B;
  --text-primary: #F0F3FB; --text-secondary: #B6C0D8; --text-tertiary: #7282A2; --text-inverse: #0B1430;
  --brand: #6F87FF; --brand-hover: #8AA0FF; --brand-active: #A6B7FF;
  --brand-soft: #1E2548; --brand-soft-hover: #2A3260;
  --strength: #34D399; --strength-bg: #064E3B; --strength-border: #047857;
  --weakness: #FBBF24; --weakness-bg: #451A03; --weakness-border: #92400E;
  --opportunity: #38BDF8; --opportunity-bg: #0C4A6E; --opportunity-border: #0369A1;
  --threat: #FB7185; --threat-bg: #4C0519; --threat-border: #9F1239;
  --success: #34D399; --success-bg: #064E3B;
  --warning: #FBBF24; --warning-bg: #451A03;
  --danger: #FB7185; --danger-bg: #4C0519;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 2px 4px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg: 0 4px 8px rgba(0,0,0,0.4), 0 12px 32px rgba(0,0,0,0.6);
  --avatar-1-bg: #1E3A8A; --avatar-1-fg: #BFDBFE;
  --avatar-2-bg: #831843; --avatar-2-fg: #FBCFE8;
  --avatar-3-bg: #064E3B; --avatar-3-fg: #6EE7B7;
  --avatar-4-bg: #78350F; --avatar-4-fg: #FCD34D;
  --avatar-5-bg: #312E81; --avatar-5-fg: #C7D2FE;
  --avatar-6-bg: #7C2D12; --avatar-6-fg: #FED7AA;
  --avatar-7-bg: #164E63; --avatar-7-fg: #A5F3FC;
  --avatar-8-bg: #831843; --avatar-8-fg: #F9A8D4;
  --avatar-9-bg: #4C1D95; --avatar-9-fg: #DDD6FE;
  --avatar-10-bg: #7F1D1D; --avatar-10-fg: #FECACA;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-page); color: var(--text-primary); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; transition: background-color 0.2s ease, color 0.2s ease; }

/* ====== APP HEADER ====== */
.app-header { background: var(--bg-elevated); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 50; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; color: var(--text-primary); letter-spacing: -0.01em; cursor: pointer; }
.logo-mark { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--brand) 0%, #6F87FF 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 13px; letter-spacing: -0.02em; box-shadow: var(--shadow-sm); }
.session-pill { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; color: var(--text-secondary); font-weight: 500; max-width: 320px; overflow: hidden; }
.session-pill .title-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-pill .code { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text-primary); letter-spacing: 0.05em; }
.header-spacer { flex: 1; }
.member-stack { display: flex; align-items: center; }
.member-stack .avatar { margin-left: -8px; border: 2px solid var(--bg-elevated); }
.member-stack .avatar:first-child { margin-left: 0; }
.member-stack .more { margin-left: -8px; width: 32px; height: 32px; border-radius: 999px; background: var(--bg-subtle); border: 2px solid var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-secondary); }

/* ====== AVATARS ====== */
.avatar { width: 32px; height: 32px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; letter-spacing: 0.02em; flex-shrink: 0; }
.avatar.sm { width: 24px; height: 24px; font-size: 10px; }
.avatar.lg { width: 40px; height: 40px; font-size: 14px; }
.avatar.xl { width: 48px; height: 48px; font-size: 16px; }

/* ====== BUTTONS ====== */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: var(--brand); color: white; box-shadow: var(--shadow-sm); }
.btn-primary:hover:not(:disabled) { background: var(--brand-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-strong); }
.btn-secondary:hover:not(:disabled) { background: var(--bg-subtle); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover:not(:disabled) { background: var(--bg-hover); color: var(--text-primary); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover:not(:disabled) { filter: brightness(1.1); }
.btn-lg { padding: 12px 22px; font-size: 14px; }
.btn-icon { padding: 8px; }

/* ====== PHASE STEPPER ====== */
.phase-stepper { background: var(--bg-elevated); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 8px; overflow-x: auto; }
.stepper-item { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.stepper-item.flex { flex: 1; min-width: 0; }
.stepper-circle { width: 28px; height: 28px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; transition: all 0.2s ease; }
.stepper-item.done .stepper-circle { background: var(--success); color: white; }
.stepper-item.active .stepper-circle { background: var(--brand); color: white; box-shadow: 0 0 0 4px var(--brand-soft); }
.stepper-item.todo .stepper-circle { background: var(--bg-subtle); color: var(--text-tertiary); border: 1px solid var(--border-strong); }
.stepper-label { display: flex; flex-direction: column; font-size: 12px; }
.stepper-label .top { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); }
.stepper-item.active .stepper-label .top { color: var(--brand); }
.stepper-item.done .stepper-label .top { color: var(--success); }
.stepper-label .bottom { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
.stepper-item.todo .stepper-label .bottom { color: var(--text-tertiary); }
.stepper-line { flex: 1; height: 2px; background: var(--border); border-radius: 1px; min-width: 16px; }
.stepper-line.done { background: var(--success); }
.stepper-progress { display: inline-flex; align-items: center; gap: 5px; margin-left: 10px; padding: 3px 9px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; position: relative; }
.stepper-progress svg { width: 11px; height: 11px; }
.stepper-progress::after { content: ''; position: absolute; top: 50%; left: -3px; width: 8px; height: 8px; border-radius: 999px; background: var(--brand); transform: translateY(-50%); animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(51,88,255,0.5); } 50% { box-shadow: 0 0 0 6px rgba(51,88,255,0); } }
.stepper-progress.complete { background: var(--success-bg); color: var(--success); }
.stepper-progress.complete::after { background: var(--success); animation: none; }

/* ====== CONTENT LAYOUT ====== */
.content { max-width: 1200px; margin: 0 auto; padding: 28px 32px 80px; }
.content.narrow { max-width: 720px; }
.content.wide { max-width: 1400px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); margin: 0 0 6px 0; }
.page-subtitle { font-size: 14px; color: var(--text-secondary); margin: 0; }

/* ====== CARDS ====== */
.card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
.card.flush { padding: 0; }
.card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.card-body { padding: 24px; }
.card-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin: 0; letter-spacing: -0.01em; }
.card-subtitle { font-size: 13px; color: var(--text-secondary); margin: 2px 0 0 0; }

/* ====== HERO + SETUP ====== */
.hero { text-align: center; padding: 40px 16px 16px; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: var(--brand-soft); color: var(--brand); border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
.hero h1 { font-size: 40px; font-weight: 800; letter-spacing: -0.03em; color: var(--text-primary); margin: 0 0 12px 0; line-height: 1.1; }
.hero h1 .accent { background: linear-gradient(135deg, var(--brand) 0%, #8AA0FF 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { font-size: 16px; color: var(--text-secondary); max-width: 540px; margin: 0 auto; }
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 32px; }
@media (max-width: 720px) { .setup-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 32px; } }
.setup-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; position: relative; overflow: hidden; transition: all 0.2s ease; box-shadow: var(--shadow-sm); }
.setup-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.setup-card.featured { background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%); color: white; border-color: transparent; }
.setup-card.featured h3, .setup-card.featured .desc { color: white; }
.setup-card.featured .field label { color: rgba(255,255,255,0.85); }
.setup-card.featured .input { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); color: white; }
.setup-card.featured .input::placeholder { color: rgba(255,255,255,0.6); }
.setup-card.featured .btn-primary { background: white; color: var(--brand); }
.setup-card.featured .btn-primary:hover { background: rgba(255,255,255,0.92); }
.setup-icon { width: 44px; height: 44px; border-radius: var(--radius-md); background: var(--brand-soft); color: var(--brand); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
.setup-icon svg { width: 22px; height: 22px; }
.setup-card.featured .setup-icon { background: rgba(255,255,255,0.16); color: white; }
.setup-card h3 { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; letter-spacing: -0.01em; }
.setup-card .desc { font-size: 13px; opacity: 0.85; margin-bottom: 20px; }

/* ====== FORMS ====== */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
.field .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
.input, .select, .textarea { width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px; background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); transition: all 0.15s ease; }
.input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
.textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.input.code-input { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600; letter-spacing: 0.2em; text-align: center; text-transform: uppercase; }
.radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.radio-card { position: relative; padding: 14px; background: var(--bg-elevated); border: 1.5px solid var(--border-strong); border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s ease; }
.setup-card.featured .radio-card { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: white; }
.radio-card.checked { border-color: var(--brand); background: var(--brand-soft); }
.setup-card.featured .radio-card.checked { background: rgba(255,255,255,0.18); border-color: white; }
.radio-card .label { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.radio-card .hint { font-size: 11px; opacity: 0.7; }

/* ====== SHARE BANNER ====== */
.share-banner { background: linear-gradient(135deg, var(--brand-soft) 0%, var(--bg-elevated) 100%); border: 1px solid var(--brand-soft); border-radius: var(--radius-lg); padding: 24px 28px; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; flex-wrap: wrap; }
.share-banner::before { content: ''; position: absolute; top: -50%; right: -10%; width: 240px; height: 240px; background: radial-gradient(circle, var(--brand-soft-hover) 0%, transparent 70%); opacity: 0.5; pointer-events: none; }
.share-banner .info { flex: 1; min-width: 200px; position: relative; }
.share-banner h3 { font-size: 14px; font-weight: 700; margin: 0 0 4px 0; color: var(--text-primary); }
.share-banner p { font-size: 13px; color: var(--text-secondary); margin: 0; }
.share-code { display: flex; align-items: center; gap: 8px; position: relative; flex-wrap: wrap; }
.share-code .code-display { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: 0.15em; background: var(--bg-elevated); border: 1px solid var(--border-strong); padding: 12px 20px; border-radius: var(--radius-md); color: var(--text-primary); box-shadow: var(--shadow-sm); }

/* ====== MEMBER LIST ====== */
.member-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
.member-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); transition: all 0.15s ease; }
.member-row:hover { background: var(--bg-subtle); }
.member-row .info { flex: 1; min-width: 0; }
.member-row .name { font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.member-row .meta { font-size: 12px; color: var(--text-tertiary); }
.role-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; background: var(--brand-soft); color: var(--brand); border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 6px; }
.status-dot { width: 8px; height: 8px; border-radius: 999px; flex-shrink: 0; }
.status-dot.active { background: var(--success); box-shadow: 0 0 0 3px var(--success-bg); }
.status-dot.idle { background: var(--warning); box-shadow: 0 0 0 3px var(--warning-bg); }
.status-dot.done { background: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }

/* ====== BADGES ====== */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge.success { background: var(--success-bg); color: var(--success); }
.badge.warning { background: var(--warning-bg); color: var(--warning); }
.badge.danger { background: var(--danger-bg); color: var(--danger); }
.badge.brand { background: var(--brand-soft); color: var(--brand); }
.badge.neutral { background: var(--bg-subtle); color: var(--text-secondary); }

/* ====== SWOT CARDS (identify + consolidate) ====== */
.identify-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .identify-grid { grid-template-columns: 1fr; } }
.swot-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; transition: all 0.2s ease; }
.swot-card:hover { box-shadow: var(--shadow-md); }
.swot-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.swot-header .title-group { display: flex; align-items: center; gap: 10px; }
.swot-header .icon-circle { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
.swot-header .title-group .name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.swot-header .title-group .desc { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.swot-header .count { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text-tertiary); background: var(--bg-subtle); padding: 4px 10px; border-radius: 999px; }
.swot-card.s .icon-circle { background: var(--strength-bg); color: var(--strength); }
.swot-card.w .icon-circle { background: var(--weakness-bg); color: var(--weakness); }
.swot-card.o .icon-circle { background: var(--opportunity-bg); color: var(--opportunity); }
.swot-card.t .icon-circle { background: var(--threat-bg); color: var(--threat); }
.swot-card.s .swot-header { background: linear-gradient(180deg, var(--strength-bg) 0%, transparent 100%); }
.swot-card.w .swot-header { background: linear-gradient(180deg, var(--weakness-bg) 0%, transparent 100%); }
.swot-card.o .swot-header { background: linear-gradient(180deg, var(--opportunity-bg) 0%, transparent 100%); }
.swot-card.t .swot-header { background: linear-gradient(180deg, var(--threat-bg) 0%, transparent 100%); }
.swot-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.swot-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.15s ease; }
.swot-item:hover { background: var(--bg-hover); }
.swot-item .text { flex: 1; font-size: 13px; color: var(--text-primary); word-break: break-word; }
.swot-item .author-pill { font-size: 10px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
.swot-item .actions { display: flex; gap: 4px; opacity: 0.5; transition: opacity 0.15s ease; flex-shrink: 0; }
.swot-item:hover .actions { opacity: 1; }
.icon-btn { width: 24px; height: 24px; border: none; background: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-tertiary); transition: all 0.15s ease; }
.icon-btn svg { width: 14px; height: 14px; }
.icon-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
.icon-btn.danger:hover { background: var(--danger-bg); color: var(--danger); }
.add-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 8px 8px 12px; background: var(--bg-elevated); border: 1.5px dashed var(--border-strong); border-radius: var(--radius-sm); margin-top: 4px; transition: all 0.15s ease; }

.add-item-row .btn { padding: 6px 12px; font-size: 12px; }

/* ====== ACTIVITY SIDEBAR ====== */
.identify-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; }
@media (max-width: 1100px) { .identify-layout { grid-template-columns: 1fr; } }
.activity-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); position: sticky; top: 152px; align-self: start; }
.activity-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.activity-header h4 { font-size: 13px; font-weight: 700; margin: 0; }
.activity-header p { font-size: 12px; color: var(--text-tertiary); margin: 2px 0 0 0; }
.activity-list { padding: 8px; max-height: 400px; overflow-y: auto; }
.activity-row { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); transition: background 0.15s ease; }
.activity-row:hover { background: var(--bg-subtle); }
.activity-row .info { flex: 1; min-width: 0; }
.activity-row .name { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-row .status { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }

/* ====== OPTION TABS (comparative mode) ====== */
.option-tabs { display: flex; gap: 6px; padding: 6px; background: var(--bg-subtle); border-radius: var(--radius-md); margin-bottom: 16px; overflow-x: auto; }
.option-tab { padding: 8px 14px; border: none; background: transparent; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.15s ease; }
.option-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
.option-tab.active { background: var(--bg-elevated); color: var(--brand); box-shadow: var(--shadow-sm); }

/* ====== SCORE PHASE ====== */
.score-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.score-toolbar .left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.progress-text { font-size: 13px; color: var(--text-secondary); }
.progress-text strong { color: var(--text-primary); font-weight: 700; }
.progress-bar { width: 160px; height: 6px; background: var(--bg-subtle); border-radius: 999px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--brand) 0%, #8AA0FF 100%); border-radius: 999px; transition: width 0.3s ease; }
.score-section { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; }
.score-section-header { padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
.score-section.s .score-section-header { background: linear-gradient(90deg, var(--strength-bg), transparent); }
.score-section.w .score-section-header { background: linear-gradient(90deg, var(--weakness-bg), transparent); }
.score-section.o .score-section-header { background: linear-gradient(90deg, var(--opportunity-bg), transparent); }
.score-section.t .score-section-header { background: linear-gradient(90deg, var(--threat-bg), transparent); }
.score-row { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); transition: background 0.15s ease; flex-wrap: wrap; }
.score-row:last-child { border-bottom: none; }
.score-row:hover { background: var(--bg-subtle); }
.score-row .text { flex: 1; min-width: 200px; font-size: 14px; color: var(--text-primary); }
.score-segments { display: flex; gap: 4px; background: var(--bg-subtle); padding: 3px; border-radius: var(--radius-sm); flex-shrink: 0; }
.score-seg { width: 36px; height: 32px; border: none; background: transparent; border-radius: 6px; font-family: inherit; font-size: 13px; font-weight: 700; color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease; }
.score-seg:hover { background: var(--bg-elevated); color: var(--text-primary); }
.score-seg.selected { background: var(--brand); color: white; box-shadow: var(--shadow-sm); }
.score-seg.selected.s { background: var(--strength); }
.score-seg.selected.w { background: var(--weakness); }
.score-seg.selected.o { background: var(--opportunity); }
.score-seg.selected.t { background: var(--threat); }
.likert-legend { display: flex; gap: 12px; font-size: 11px; color: var(--text-tertiary); flex-wrap: wrap; }
.likert-legend span { display: flex; align-items: center; gap: 4px; }
.likert-legend strong { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.submit-bar { position: sticky; bottom: 0; background: var(--bg-elevated); border-top: 1px solid var(--border); padding: 16px 24px; margin: 24px -32px -80px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -4px 16px rgba(11,20,48,0.06); z-index: 10; flex-wrap: wrap; gap: 12px; }
[data-theme="dark"] .submit-bar { box-shadow: 0 -4px 16px rgba(0,0,0,0.4); }

/* ====== RESULTS - RECOMMENDATION CARD ====== */
.rec-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 32px; margin-bottom: 20px; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
.rec-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--text-tertiary); }
.rec-card.yes-strong::before { background: linear-gradient(90deg, var(--success), #34D399); }
.rec-card.yes-lean::before { background: linear-gradient(90deg, #34D399, #6EE7B7); }
.rec-card.inconclusive::before { background: linear-gradient(90deg, var(--text-tertiary), var(--border-strong)); }
.rec-card.no-lean::before { background: linear-gradient(90deg, #FB7185, var(--danger)); }
.rec-card.no-strong::before { background: linear-gradient(90deg, var(--danger), #BE123C); }
.rec-top { display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center; margin-bottom: 24px; }
.rec-icon { width: 72px; height: 72px; border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rec-icon.yes { background: var(--success-bg); color: var(--success); }
.rec-icon.no { background: var(--danger-bg); color: var(--danger); }
.rec-icon.maybe { background: var(--bg-subtle); color: var(--text-tertiary); }
.rec-icon svg { width: 40px; height: 40px; }
.rec-content .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 4px; }
.rec-content h2 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px 0; color: var(--text-primary); }
.rec-content p { font-size: 14px; color: var(--text-secondary); margin: 0; max-width: 620px; line-height: 1.55; }
.rec-scale { margin-top: 4px; }
.rec-track { position: relative; height: 14px; display: flex; border-radius: 999px; overflow: hidden; background: var(--bg-subtle); }
.rec-zone { flex: 1; height: 100%; }
.rec-zone.no-strong { background: linear-gradient(90deg, var(--danger), color-mix(in srgb, var(--danger) 60%, transparent)); }
.rec-zone.no-lean { background: color-mix(in srgb, var(--danger) 30%, var(--bg-subtle)); flex: 0.7; }
.rec-zone.neutral { background: var(--bg-subtle); flex: 0.6; }
.rec-zone.yes-lean { background: color-mix(in srgb, var(--success) 30%, var(--bg-subtle)); flex: 0.7; }
.rec-zone.yes-strong { background: linear-gradient(90deg, color-mix(in srgb, var(--success) 60%, transparent), var(--success)); }
.rec-marker { position: absolute; top: 50%; width: 22px; height: 22px; border-radius: 999px; background: var(--bg-elevated); border: 3px solid var(--text-primary); transform: translate(-50%, -50%); box-shadow: var(--shadow-md); z-index: 2; }
.rec-card.yes-strong .rec-marker { border-color: var(--success); }
.rec-card.yes-lean .rec-marker { border-color: #34D399; }
.rec-card.no-strong .rec-marker { border-color: var(--danger); }
.rec-card.no-lean .rec-marker { border-color: #FB7185; }
.rec-axis { display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.rec-formula { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; padding-top: 18px; border-top: 1px dashed var(--border); font-size: 13px; flex-wrap: wrap; gap: 8px; }
.rec-formula .score-display { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px; color: var(--text-primary); }
.rec-formula .score-display .pos { color: var(--success); }
.rec-formula .score-display .neg { color: var(--danger); }
.rec-formula .breakdown { color: var(--text-tertiary); font-size: 12px; }
.rec-formula .breakdown code { font-family: 'JetBrains Mono', monospace; background: var(--bg-subtle); padding: 2px 6px; border-radius: 4px; color: var(--text-secondary); font-weight: 600; }

/* ====== INPUT CARDS (consensus + sowt) ====== */
.input-cards { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .input-cards { grid-template-columns: 1fr; } }
.input-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: relative; display: flex; flex-direction: column; }
.input-card .weight-tag { display: inline-flex; align-items: center; gap: 5px; align-self: flex-start; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.input-card.primary .weight-tag { background: var(--brand-soft); color: var(--brand); }
.input-card.secondary .weight-tag { background: var(--bg-subtle); color: var(--text-secondary); }
.input-card h3 { font-size: 16px; font-weight: 700; margin: 0 0 12px 0; color: var(--text-primary); letter-spacing: -0.01em; }
.input-card .desc { font-size: 13px; color: var(--text-secondary); margin: 0 0 12px 0; line-height: 1.5; }
.vector-summary { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--bg-subtle); border-radius: var(--radius-md); margin-bottom: 12px; }
.vector-summary .qbadge { width: 44px; height: 44px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
.vector-summary .qbadge.yes { background: var(--success-bg); color: var(--success); }
.vector-summary .qbadge.no { background: var(--danger-bg); color: var(--danger); }
.vector-summary .qbadge.maybe { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-strong); }
.vector-summary .vinfo .quadrant-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.vector-summary .vinfo .vmag { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.vector-summary .vinfo .vmag strong { color: var(--text-primary); font-weight: 700; }
.contribution-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; margin-top: auto; border-top: 1px dashed var(--border); font-size: 12px; }
.contribution-row .label-text { color: var(--text-tertiary); font-weight: 600; }
.contribution-row .value-text { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; color: var(--text-primary); }
.contribution-row .value-text.pos { color: var(--success); }
.contribution-row .value-text.neg { color: var(--danger); }
.index-display-large { display: flex; align-items: baseline; gap: 8px; padding: 14px; background: var(--bg-subtle); border-radius: var(--radius-md); margin-bottom: 12px; }
.index-display-large .num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.index-display-large .num.pos { color: var(--success); }
.index-display-large .num.neg { color: var(--danger); }
.index-display-large .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); align-self: center; }

/* ====== METRICS ====== */
.metric-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 720px) { .metric-cards { grid-template-columns: repeat(2, 1fr); } }
.metric-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; position: relative; overflow: hidden; }

.metric-card.w::before { background: var(--weakness); }
.metric-card.o::before { background: var(--opportunity); }
.metric-card.t::before { background: var(--threat); }
.metric-card .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.metric-card .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); }
.metric-card .value { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
.metric-card .value-bar { height: 4px; background: var(--bg-subtle); border-radius: 999px; overflow: hidden; margin-top: 8px; }
.metric-card .value-bar .fill { height: 100%; border-radius: 999px; transition: width 0.6s ease; }
.metric-card.s .value-bar .fill { background: var(--strength); }
.metric-card.w .value-bar .fill { background: var(--weakness); }
.metric-card.o .value-bar .fill { background: var(--opportunity); }
.metric-card.t .value-bar .fill { background: var(--threat); }

/* ====== PLOT ====== */
.plot-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }
.plot-svg-wrap { position: relative; display: flex; justify-content: center; margin: 20px auto; }

/* ====== COMPARATIVE RESULTS ====== */
.compare-results { display: grid; grid-template-columns: 1fr; gap: 20px; }
.compare-table { width: 100%; border-collapse: collapse; }
.compare-table th, .compare-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
.compare-table th { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); background: var(--bg-subtle); }
.compare-table td.num { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.compare-table td.rec { font-weight: 700; }
.compare-table tr.winner { background: var(--success-bg); }
.compare-table tr.winner td { color: var(--text-primary); }
.compare-table .rank-cell { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--brand); }

/* ====== UTILITY ====== */
.divider { height: 1px; background: var(--border); margin: 16px 0; border: 0; }
.btn-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.btn-row.between { justify-content: space-between; }
.btn-row.end { justify-content: flex-end; }
.empty-state { padding: 32px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; }
.kbd { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: var(--bg-subtle); border: 1px solid var(--border); color: var(--text-secondary); }

/* ====== TOAST ====== */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; box-shadow: var(--shadow-lg); font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 10px; min-width: 240px; max-width: 360px; animation: slide-in 0.2s ease-out; pointer-events: auto; }
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }
.toast.info { border-left: 4px solid var(--brand); }
@keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ====== MODAL ====== */
.modal-backdrop { position: fixed; inset: 0; background: rgba(11,20,48,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
[data-theme="dark"] .modal-backdrop { background: rgba(0,0,0,0.7); }
.modal { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 24px; max-width: 480px; width: 100%; box-shadow: var(--shadow-xl); }
.modal h3 { font-size: 18px; font-weight: 700; margin: 0 0 8px 0; }
.modal p { font-size: 14px; color: var(--text-secondary); margin: 0 0 16px 0; }

/* ====== LOADING ====== */
.loading-screen { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 12px; color: var(--text-secondary); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--bg-subtle); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* options config (comparative setup) */
.options-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.option-row { display: flex; align-items: center; gap: 8px; }
.option-row .num { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: var(--text-tertiary); width: 24px; flex-shrink: 0; }
.option-row .input { flex: 1; }

<!-- Mount point -->
<div id="app"></div>
<div id="toasts" class="toast-container"></div>
<div id="modal-mount"></div>

<script>
// ============================================================================
// APP CODE - injected below
// ============================================================================
// PRE-CONFIGURED CREDENTIALS (optional — paste once, distribute the file)
// ============================================================================
// Fill these in to skip the config screen for everyone who opens this file.
//
// Both values are SAFE to embed in browser code:
//   - The "Project URL" is a public HTTPS endpoint
//   - The "Publishable key" (or legacy "anon" key) is *designed* to be public.
//     Your data is protected by your Row Level Security policies, not by
//     keeping this string secret. Supabase docs confirm this explicitly.
//
// Leave both as empty strings ('') to keep the in-app config screen instead.
// ============================================================================
const PRECONFIGURED = {
  url: '',       // e.g. 'https://abcdefg.supabase.co'
  anonKey: '',   // e.g. 'sb_publishable_AbCdEf123...' or legacy 'eyJhbGc...'
};

function isPreconfigured() {
  return !!(PRECONFIGURED.url && PRECONFIGURED.anonKey);
}

// ============================================================================
// CONSTANTS AND HELPERS
// ============================================================================
const CATEGORIES = ['S', 'W', 'O', 'T'];
const CATEGORY_NAMES = { S: 'Strengths', W: 'Weaknesses', O: 'Opportunities', T: 'Threats' };
const CATEGORY_DESC = { S: 'Internal · helpful', W: 'Internal · harmful', O: 'External · helpful', T: 'External · harmful' };
const PHASES = ['lobby', 'identify', 'consolidate', 'score', 'results'];
const PHASE_LABELS = { lobby: 'Lobby', identify: 'Identify', consolidate: 'Consolidate', score: 'Score', results: 'Results' };
const PHASE_NUMS = { lobby: 0, identify: 1, consolidate: 2, score: 3, results: 4 };

const CODE_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
function genCode(len = 6) {
  let code = '';
  for (let i = 0; i < len; i++) code += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
  return code;
}
function genId() {
  return 'u_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function avatarStyle(idx) {
  const n = (idx % 10) + 1;
  return `background:var(--avatar-${n}-bg);color:var(--avatar-${n}-fg)`;
}
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}
function toast(msg, type = 'info', ms = 3000) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(20px)'; setTimeout(() => t.remove(), 200); }, ms);
}

// URL hash → join code (for invite links like .../sowhat_app.html#join=ABC123)
function getJoinCodeFromUrl() {
  if (typeof window === 'undefined' || !window.location) return null;
  const hash = window.location.hash || '';
  const m = hash.match(/^#join=([A-Za-z0-9]{6})/);
  return m ? m[1].toUpperCase() : null;
}

// Build a shareable invite link from a session code
function buildInviteLink(code) {
  if (typeof window === 'undefined') return code;
  const base = window.location.href.split('#')[0];
  return `${base}#join=${code}`;
}

// ============================================================================
// STATE
// ============================================================================
const state = {
  // Identity
  user: null,           // {id, name}
  // Supabase
  supabase: null,
  config: null,         // {url, anonKey}
  // Session
  session: null,        // session row
  members: [],
  items: [],
  scores: [],           // each: {item_id, user_id, score}
  // UI
  view: 'loading',      // loading | config | setup | lobby | identify | consolidate | score | results
  activeOptionId: 'main',  // for comparative mode
  pendingJoinCode: null,   // set if user arrived via invite link
  // realtime channel
  channel: null,
};

// localStorage keys
const LS = {
  CONFIG: 'sowhat_v2:config',
  USER: 'sowhat_v2:user',
  THEME: 'sowhat_v2:theme',
  CURRENT: 'sowhat_v2:current_session',  // {code, role}
};

// ============================================================================
// SUPABASE INITIALIZATION
// ============================================================================
async function initSupabase() {
  if (!state.config) return false;
  try {
    state.supabase = window.supabase.createClient(state.config.url, state.config.anonKey, {
      realtime: { params: { eventsPerSecond: 5 } }
    });
    // sanity check
    const { error } = await state.supabase.from('sessions').select('id').limit(1);
    if (error) {
      console.error('Supabase test query failed:', error);
      toast('Supabase connection failed: ' + error.message, 'error', 6000);
      return false;
    }
    return true;
  } catch (e) {
    console.error('Supabase init error:', e);
    toast('Could not connect to Supabase', 'error', 6000);
    return false;
  }
}

// ============================================================================
// PERSISTENCE
// ============================================================================
function loadConfig() {
  try { return JSON.parse(localStorage.getItem(LS.CONFIG) || 'null'); } catch { return null; }
}
function saveConfig(cfg) {
  localStorage.setItem(LS.CONFIG, JSON.stringify(cfg));
}
function clearConfig() { localStorage.removeItem(LS.CONFIG); }

function loadUser() {
  try { return JSON.parse(localStorage.getItem(LS.USER) || 'null'); } catch { return null; }
}
function saveUser(u) { localStorage.setItem(LS.USER, JSON.stringify(u)); }

function loadTheme() { return localStorage.getItem(LS.THEME) || 'light'; }
function saveTheme(t) { localStorage.setItem(LS.THEME, t); }

function setCurrent(code, role) {
  if (!code) localStorage.removeItem(LS.CURRENT);
  else localStorage.setItem(LS.CURRENT, JSON.stringify({ code, role }));
}
function getCurrent() {
  try { return JSON.parse(localStorage.getItem(LS.CURRENT) || 'null'); } catch { return null; }
}

// ============================================================================
// CALCULATIONS - SOWhaT methodology + recommendation
// ============================================================================
function calculateForOption(optionId) {
  const optionItems = state.items.filter(i => i.option_id === optionId);
  const sums = { S: 0, W: 0, O: 0, T: 0 };
  const counts = { S: 0, W: 0, O: 0, T: 0 };
  const itemDetails = [];

  for (const item of optionItems) {
    const itemScores = state.scores.filter(s => s.item_id === item.id);
    if (itemScores.length === 0) continue;
    const avg = itemScores.reduce((a, s) => a + s.score, 0) / itemScores.length;
    sums[item.category] += avg;
    counts[item.category] += 1;
    itemDetails.push({ ...item, avg, n: itemScores.length });
  }

  // Category averages (mean of item averages)
  const S = counts.S > 0 ? sums.S / counts.S : 0;
  const W = counts.W > 0 ? sums.W / counts.W : 0;
  const O = counts.O > 0 ? sums.O / counts.O : 0;
  const T = counts.T > 0 ? sums.T / counts.T : 0;

  // 1D SOWT index (paper formula): ((S+O) - (W+T)) / 6, range [-1, +1]
  const sowt = ((S + O) - (W + T)) / 6;

  // 2D consensus vector
  // Paper: X = O - T (horizontal), Y = S - W (vertical)
  // Each ranges -3..+3
  const Xraw = O - T;
  const Yraw = S - W;
  const X = Xraw / 3;  // normalize to [-1, +1]
  const Y = Yraw / 3;
  // NCV = sqrt(X^2 + Y^2) * 3 / sqrt(18)  -- but easier: use raw, divide by sqrt(18)
  const NCV = Math.sqrt(Xraw * Xraw + Yraw * Yraw) / Math.sqrt(18);

  // Quadrant determination
  // Q1: X>=0, Y>=0 → strong yes direction
  // Q3: X<=0, Y<=0 → strong no direction
  // Q2: X<0, Y>=0 → mixed (S helps but O missing); subdivide by sowt sign
  // Q4: X>=0, Y<0 → mixed (O helps but W high); subdivide by sowt sign
  let quadrant, subQuadrant, directionalFactor;
  if (X >= 0 && Y >= 0) { quadrant = 'I'; subQuadrant = 'I'; directionalFactor = 1.0; }
  else if (X < 0 && Y < 0) { quadrant = 'III'; subQuadrant = 'III'; directionalFactor = -1.0; }
  else if (X < 0 && Y >= 0) {
    quadrant = 'II';
    if (sowt >= 0) { subQuadrant = 'IIa'; directionalFactor = 0.4; }
    else { subQuadrant = 'IIb'; directionalFactor = -0.4; }
  } else {
    quadrant = 'IV';
    if (sowt >= 0) { subQuadrant = 'IVa'; directionalFactor = 0.4; }
    else { subQuadrant = 'IVb'; directionalFactor = -0.4; }
  }

  // Recommendation: 75% vector, 25% sowt
  const vectorScore = NCV * directionalFactor;
  const recommendation = 0.75 * vectorScore + 0.25 * sowt;

  // Verdict bands
  let verdict;
  if (recommendation >= 0.5) verdict = 'yes-strong';
  else if (recommendation >= 0.15) verdict = 'yes-lean';
  else if (recommendation > -0.15) verdict = 'inconclusive';
  else if (recommendation > -0.5) verdict = 'no-lean';
  else verdict = 'no-strong';

  return {
    optionId, S, W, O, T, sowt, X, Y, NCV, Xraw, Yraw,
    quadrant, subQuadrant, directionalFactor, vectorScore,
    recommendation, verdict,
    itemDetails, totalItems: optionItems.length,
  };
}

const VERDICT_INFO = {
  'yes-strong': { label: 'Strong Yes', headline: 'Strong Yes — proceed', icon: 'i-thumbs-up', iconClass: 'yes', desc: 'The consensus vector lands cleanly in Quadrant I with high magnitude, and the SOWT index agrees on direction. The team is well-aligned.' },
  'yes-lean': { label: 'Lean Yes', headline: 'Lean Yes — proceed cautiously', icon: 'i-thumbs-up', iconClass: 'yes', desc: 'The recommendation tilts positive, but consensus or quadrant placement is mixed. Worth a closer look at where the disagreements lie before committing.' },
  'inconclusive': { label: 'Inconclusive', headline: 'Inconclusive — gather more input', icon: 'i-help-circle', iconClass: 'maybe', desc: 'The team is genuinely split, or the consensus vector is too short to call this confidently either way. Consider revisiting items the team weighted lowest in agreement.' },
  'no-lean': { label: 'Lean No', headline: 'Lean No — likely defer', icon: 'i-thumbs-down', iconClass: 'no', desc: 'The recommendation tilts negative, but consensus or quadrant placement is mixed. Worth examining what would need to change to flip the decision.' },
  'no-strong': { label: 'Strong No', headline: 'Strong No — do not proceed', icon: 'i-thumbs-down', iconClass: 'no', desc: 'The consensus vector lands clearly in Quadrant III with high magnitude, and the SOWT index agrees on direction. The team is well-aligned against this option.' },
};

// ============================================================================
// SUPABASE OPERATIONS
// ============================================================================
async function createSession({ title, question, mode, options, leadName }) {
  const code = genCode();
  const optionsArr = mode === 'comparative' ? options.map(name => ({ id: genId(), name })) : [{ id: 'main', name: 'Main' }];
  const { data, error } = await state.supabase
    .from('sessions')
    .insert({
      code, title, question: question || '',
      mode, options: optionsArr,
      lead_id: state.user.id, lead_name: leadName, phase: 'lobby',
    })
    .select()
    .single();
  if (error) throw error;
  // Insert lead as member
  await state.supabase.from('members').insert({
    session_id: data.id, user_id: state.user.id, name: leadName,
  });
  return data;
}

async function joinSession(code, name) {
  const { data: session, error } = await state.supabase
    .from('sessions').select('*').eq('code', code.toUpperCase()).maybeSingle();
  if (error) throw error;
  if (!session) throw new Error('No session found with that code');

  // Check member count
  const { count } = await state.supabase.from('members')
    .select('*', { count: 'exact', head: true }).eq('session_id', session.id);
  if (count >= 10) throw new Error('Session is full (10 members maximum)');

  // Upsert member (in case they're rejoining)
  const { error: memErr } = await state.supabase.from('members').upsert({
    session_id: session.id, user_id: state.user.id, name,
    last_seen: new Date().toISOString(),
  }, { onConflict: 'session_id,user_id' });
  if (memErr) throw memErr;

  return session;
}

async function loadSessionData(sessionId) {
  const [{ data: session }, { data: members }, { data: items }, { data: scores }] = await Promise.all([
    state.supabase.from('sessions').select('*').eq('id', sessionId).single(),
    state.supabase.from('members').select('*').eq('session_id', sessionId),
    state.supabase.from('items').select('*').eq('session_id', sessionId),
    state.supabase.from('scores').select('*').eq('session_id', sessionId),
  ]);
  state.session = session;
  state.members = members || [];
  state.items = items || [];
  state.scores = scores || [];
  // pick first option for comparative mode
  if (state.session.mode === 'comparative' && state.session.options.length > 0) {
    if (!state.session.options.find(o => o.id === state.activeOptionId)) {
      state.activeOptionId = state.session.options[0].id;
    }
  } else {
    state.activeOptionId = 'main';
  }
}

function subscribeRealtime(sessionId) {
  if (state.channel) state.supabase.removeChannel(state.channel);

  state.channel = state.supabase.channel(`sowhat:${sessionId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sessions', filter: `id=eq.${sessionId}` }, (payload) => {
      if (payload.eventType === 'UPDATE') {
        state.session = payload.new;
        syncViewToPhase();
        render();
      }
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'members', filter: `session_id=eq.${sessionId}` }, async () => {
      const { data } = await state.supabase.from('members').select('*').eq('session_id', sessionId);
      state.members = data || [];
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items', filter: `session_id=eq.${sessionId}` }, async () => {
      const { data } = await state.supabase.from('items').select('*').eq('session_id', sessionId);
      state.items = data || [];
      render();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'scores', filter: `session_id=eq.${sessionId}` }, async () => {
      const { data } = await state.supabase.from('scores').select('*').eq('session_id', sessionId);
      state.scores = data || [];
      render();
    })
    .subscribe();
}

async function unsubscribeRealtime() {
  if (state.channel) {
    await state.supabase.removeChannel(state.channel);
    state.channel = null;
  }
}

// Heartbeat - update last_seen every 20s
let heartbeatInterval = null;
function startHeartbeat() {
  stopHeartbeat();
  heartbeatInterval = setInterval(async () => {
    if (!state.session || !state.user) return;
    await state.supabase.from('members')
      .update({ last_seen: new Date().toISOString() })
      .eq('session_id', state.session.id).eq('user_id', state.user.id);
  }, 20000);
}
function stopHeartbeat() {
  if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; }
}

function syncViewToPhase() {
  if (state.session) state.view = state.session.phase;
}

// ============================================================================
// CRUD operations
// ============================================================================
async function addItem(category, text) {
  if (!text.trim()) return;
  const optionId = state.session.mode === 'comparative' ? state.activeOptionId : 'main';
  const { error } = await state.supabase.from('items').insert({
    session_id: state.session.id,
    option_id: optionId,
    category, text: text.trim(),
    author_id: state.user.id,
    author_name: getMyMember()?.name || state.user.name,
  });
  if (error) toast(error.message, 'error');
}

async function updateItemText(itemId, text) {
  const { error } = await state.supabase.from('items').update({ text: text.trim() }).eq('id', itemId);
  if (error) toast(error.message, 'error');
}

async function deleteItem(itemId) {
  const { error } = await state.supabase.from('items').delete().eq('id', itemId);
  if (error) toast(error.message, 'error');
}

async function setScore(itemId, score) {
  const { error } = await state.supabase.from('scores').upsert({
    session_id: state.session.id,
    item_id: itemId,
    user_id: state.user.id,
    score,
    updated_at: new Date().toISOString(),
  }, { onConflict: 'item_id,user_id' });
  if (error) toast(error.message, 'error');
}

async function setIdentifyDone(done) {
  const { error } = await state.supabase.from('members')
    .update({ identify_done: done })
    .eq('session_id', state.session.id).eq('user_id', state.user.id);
  if (error) toast(error.message, 'error');
}

async function setScoreSubmitted(optionId, submitted) {
  const me = getMyMember();
  const updated = { ...(me?.score_submitted || {}), [optionId]: submitted };
  const { error } = await state.supabase.from('members')
    .update({ score_submitted: updated })
    .eq('session_id', state.session.id).eq('user_id', state.user.id);
  if (error) toast(error.message, 'error');
}

async function advancePhase(toPhase) {
  const { error } = await state.supabase.from('sessions')
    .update({ phase: toPhase, updated_at: new Date().toISOString() })
    .eq('id', state.session.id);
  if (error) toast(error.message, 'error');
}

// ============================================================================
// HELPERS
// ============================================================================
function isLead() { return state.session && state.session.lead_id === state.user.id; }
function getMyMember() { return state.members.find(m => m.user_id === state.user.id); }
function memberById(id) { return state.members.find(m => m.user_id === id); }

function itemsForOption(optionId, category) {
  return state.items.filter(i => i.option_id === optionId && i.category === category);
}

function myScoreFor(itemId) {
  const s = state.scores.find(sc => sc.item_id === itemId && sc.user_id === state.user.id);
  return s ? s.score : null;
}

function identifyDoneCount() {
  return state.members.filter(m => m.identify_done).length;
}

function scoreSubmittedCount(optionId) {
  return state.members.filter(m => m.score_submitted && m.score_submitted[optionId]).length;
}

function scoreSubmittedCountAll() {
  // For binary: just count main; for comparative: count members done with ALL options
  if (state.session.mode === 'binary') {
    return scoreSubmittedCount('main');
  }
  return state.members.filter(m => {
    if (!m.score_submitted) return false;
    return state.session.options.every(o => m.score_submitted[o.id]);
  }).length;
}

function isMemberOnline(member) {
  if (!member.last_seen) return false;
  const ageMs = Date.now() - new Date(member.last_seen).getTime();
  return ageMs < 60000; // active if seen in last minute
}

function render() {
  const app = document.getElementById('app');

    case 'loading': app.innerHTML = renderLoading(); break;

    case 'results': app.innerHTML = renderShell(renderResults()); attachShellHandlers(); attachResultsHandlers(); break;

  }
}

      startHeartbeat();

function renderMemberStack() {
  const max = 4;
  const m = state.members.slice(0, max);

  return `

      ${m.map((mem, i) => `<div class="avatar" title="${esc(mem.name)}" style="${avatarStyle(state.members.indexOf(mem))}">${esc(initials(mem.name))}</div>`).join('')}
      ${more > 0 ? `<div class="more">+${more}</div>` : ''}
    </div>
  `;
}

function renderPhaseStepper() {
  const cur = PHASE_NUMS[state.session.phase];
  const stepperPhases = ['identify', 'consolidate', 'score', 'results'];
  // Compute live progress for the active phase
  let progressBadge = '';
  const totalMembers = state.members.length;

  if (state.session.phase === 'identify') {
    const done = identifyDoneCount();
    progressBadge = renderProgressBadge(done, totalMembers, done >= totalMembers);
  } else if (state.session.phase === 'score') {
    const done = scoreSubmittedCountAll();
    progressBadge = renderProgressBadge(done, totalMembers, done >= totalMembers);
  }

  const items = stepperPhases.map((p, i) => {
    const num = i + 1;
    const phaseNum = PHASE_NUMS[p];
    let cls = 'todo';
    if (phaseNum < cur) cls = 'done';
    else if (phaseNum === cur) cls = 'active';
    const circle = cls === 'done' ? '<svg width="14" height="14"><use href="#i-check"/></svg>' : num;
    const showProgress = cls === 'active' && (p === 'identify' || p === 'score');
    return `
      <div class="stepper-item ${cls}">
        <div class="stepper-circle">${circle}</div>
        <div class="stepper-label">
          <span class="top">Phase ${num}</span>
          <span class="bottom">${PHASE_LABELS[p]}</span>
        </div>
        ${showProgress ? progressBadge : ''}
      </div>
      ${i < stepperPhases.length - 1 ? `<div class="stepper-line ${phaseNum < cur ? 'done' : ''}"></div>` : ''}
    `;
  }).join('');
  return `<div class="phase-stepper">${items}</div>`;
}

function renderProgressBadge(done, total, complete) {
  const cls = complete ? 'complete' : '';
  return `<span class="stepper-progress ${cls}" title="${esc(done + ' of ' + total + ' done')}"><svg><use href="#i-users"/></svg> ${done} / ${total}</span>`;
}

function renderMemberRow(m, idx) {
  const isLeadMember = m.user_id === state.session.lead_id;
  const online = isMemberOnline(m);

  return `

    </div>
  `;
}

function formatTimeAgo(iso) {
  if (!iso) return 'just now';
  const ageS = Math.max(0, (Date.now() - new Date(iso).getTime()) / 1000);
  if (ageS < 30) return 'just now';
  if (ageS < 90) return '1 min ago';
  if (ageS < 3600) return Math.floor(ageS / 60) + ' min ago';
  if (ageS < 7200) return '1 hour ago';
  if (ageS < 86400) return Math.floor(ageS / 3600) + ' hours ago';
  return Math.floor(ageS / 86400) + ' days ago';
}

            <span class="text">${esc(item.text)}</span>
            ${!locked ? `<div class="actions">
              <button class="icon-btn" data-action="edit" title="Edit"><svg><use href="#i-edit"/></svg></button>
              <button class="icon-btn danger" data-action="delete" title="Remove"><svg><use href="#i-trash"/></svg></button>
            </div>` : ''}
          </div>
        `).join('')}
        ${!locked ? `
          <div class="add-item-row">
            <input placeholder="Add ${cat === 'O' ? 'an' : 'a'} ${CATEGORY_NAMES[cat].slice(0,-1).toLowerCase()}…" data-cat="${cat}">
            <button class="btn btn-secondary" data-add="${cat}"><svg><use href="#i-plus"/></svg> Add</button>
          </div>
        ` : `<div class="empty-state" style="padding:8px">${myItems.length === 0 ? 'No items added' : 'Editing locked — click "Keep adding" to unlock'}</div>`}
      </div>
    </div>
  `;
}

function renderActivityRow(m, idx, phase) {
  let status = '';
  let dotCls = 'idle';
  if (phase === 'identify') {
    const myItemCount = state.items.filter(i => i.author_id === m.user_id).length;
    if (m.identify_done) {
      status = `Submitted · ${myItemCount} items`;
      dotCls = 'done';
    } else {
      status = `${myItemCount} items added`;
      dotCls = isMemberOnline(m) ? 'active' : 'idle';
    }
  } else if (phase === 'score') {
    const submitted = state.session.mode === 'binary'
      ? !!(m.score_submitted && m.score_submitted.main)
      : state.session.options.every(o => m.score_submitted && m.score_submitted[o.id]);
    if (submitted) { status = 'Submitted scores'; dotCls = 'done'; }
    else {
      const myScores = state.scores.filter(s => s.user_id === m.user_id).length;
      status = `${myScores} items scored`;
      dotCls = isMemberOnline(m) ? 'active' : 'idle';
    }
  }
  return `
    <div class="activity-row">
      <div class="avatar" style="${avatarStyle(idx)}">${esc(initials(m.name))}</div>
      <div class="info">
        <div class="name">${esc(m.name)}${m.user_id === state.session.lead_id ? '<span class="role-badge">Lead</span>' : ''}</div>
        <div class="status"><div class="status-dot ${dotCls}"></div> ${status}</div>
      </div>
    </div>
  `;
}

function attachIdentifyHandlers() {
  attachOptionTabHandlers();

  // Add via button
  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const cat = btn.dataset.add;
      const input = document.querySelector(`input[data-cat="${cat}"]`);
      const text = input.value.trim();
      if (text) { await addItem(cat, text); input.value = ''; input.focus(); }
    });
  });
  // Add via Enter
  document.querySelectorAll('input[data-cat]').forEach(input => {
    input.addEventListener('keydown', async e => {
      if (e.key === 'Enter') {
        const cat = input.dataset.cat;
        const text = input.value.trim();
        if (text) { await addItem(cat, text); input.value = ''; }
      }
    });
  });
  // Edit
  document.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = btn.closest('.swot-item');
      const id = row.dataset.itemId;
      const item = state.items.find(i => i.id === id);
      const next = prompt('Edit item', item.text);
      if (next != null && next.trim() && next.trim() !== item.text) updateItemText(id, next);
    });
  });
  // Delete
  document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = btn.closest('.swot-item');
      const id = row.dataset.itemId;
      if (confirm('Remove this item?')) deleteItem(id);
    });
  });
  // Done / Keep adding
  const done = document.getElementById('btn-done');
  if (done) done.addEventListener('click', () => setIdentifyDone(true));
  const undone = document.getElementById('btn-undone');
  if (undone) undone.addEventListener('click', () => setIdentifyDone(false));
  // Advance (lead only)
  const adv = document.getElementById('btn-advance');
  if (adv) adv.addEventListener('click', () => {
    if (confirm('Advance to consolidation phase? You can review and de-duplicate everyone\'s items there.')) {
      advancePhase('consolidate');
    }
  });
}

// ============================================================================
// CONSOLIDATE PHASE — lead reviews + edits all items together
// ============================================================================
function renderConsolidate() {
  const lead = isLead();
  const optionId = state.session.mode === 'comparative' ? state.activeOptionId : 'main';

  return `
    <div class="content wide">
      <div class="page-header">
        <div>
          <h1 class="page-title">Consolidate items</h1>
          <p class="page-subtitle">${lead
            ? 'Review the combined list. Remove duplicates and edit text to clean up the items everyone will score.'
            : 'The team lead is reviewing the combined list. Items will be locked once we move to scoring.'}</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${lead ? `
            <button class="btn btn-secondary" id="btn-back">Back to identify</button>
            <button class="btn btn-primary" id="btn-to-score">Begin scoring <svg><use href="#i-arrow-right"/></svg></button>
          ` : `<span class="badge neutral">Waiting on team lead</span>`}
        </div>
      </div>

      ${renderOptionTabs()}

      <div class="identify-grid">
        ${CATEGORIES.map(cat => renderConsolidateCard(cat, optionId, lead)).join('')}

          `;

        ${canEdit ? `
          <div class="add-item-row">
