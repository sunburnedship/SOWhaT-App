}

function attachConsolidateHandlers() {
  attachOptionTabHandlers();

  document.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const cat = btn.dataset.add;
      const input = document.querySelector(`input[data-cat="${cat}"]`);
      const text = input.value.trim();
      if (text) { await addItem(cat, text); input.value = ''; input.focus(); }
    });
  });
  document.querySelectorAll('input[data-cat]').forEach(input => {
    input.addEventListener('keydown', async e => {
      if (e.key === 'Enter') {
        const cat = input.dataset.cat;
        const text = input.value.trim();
        if (text) { await addItem(cat, text); input.value = ''; }
      }
    });
  });
  document.querySelectorAll('[data-action="edit"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('.swot-item').dataset.itemId;
      const item = state.items.find(i => i.id === id);
      const next = prompt('Edit item', item.text);
      if (next != null && next.trim() && next.trim() !== item.text) updateItemText(id, next);
    });
  });
  document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.closest('.swot-item').dataset.itemId;
      if (confirm('Remove this item?')) deleteItem(id);
    });
  });
  const back = document.getElementById('btn-back');
  if (back) back.addEventListener('click', () => advancePhase('identify'));
  const next = document.getElementById('btn-to-score');
  if (next) next.addEventListener('click', () => {
    // Make sure each option (in comparative) has at least one item per category
    const optionIds = state.session.mode === 'comparative' ? state.session.options.map(o => o.id) : ['main'];
    let warnings = [];
    for (const optId of optionIds) {
      const optName = state.session.mode === 'comparative'
        ? state.session.options.find(o => o.id === optId).name : '';
      for (const cat of CATEGORIES) {
        if (itemsForOption(optId, cat).length === 0) {
          warnings.push(`${optName ? optName + ': ' : ''}no ${CATEGORY_NAMES[cat]}`);
        }
      }
    }
    if (warnings.length > 0) {
      if (!confirm('Some categories are empty:\n\n' + warnings.join('\n') + '\n\nProceed anyway?')) return;
    }
    advancePhase('score');
  });
}

// ============================================================================
// SCORE PHASE
// ============================================================================
function renderScore() {
  const me = getMyMember();
  const lead = isLead();
  const optionId = state.session.mode === 'comparative' ? state.activeOptionId : 'main';
  const submitted = !!(me?.score_submitted && me.score_submitted[optionId]);
  const allOptionsSubmitted = state.session.mode === 'binary'
    ? submitted
    : state.session.options.every(o => me?.score_submitted && me.score_submitted[o.id]);

  // Item-level progress for the active option
  const optionItems = state.items.filter(i => i.option_id === optionId);
  const myScoredCount = optionItems.filter(i => myScoreFor(i.id) !== null).length;
  const totalItems = optionItems.length;
  const pct = totalItems > 0 ? Math.round((myScoredCount / totalItems) * 100) : 0;

  // Team-wide submission tracking for advancing
  const allDone = state.members.length > 0 && state.members.every(m => {
    if (state.session.mode === 'binary') return m.score_submitted && m.score_submitted.main;
    return state.session.options.every(o => m.score_submitted && m.score_submitted[o.id]);
  });

  return `
    <div class="content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Score each item</h1>
          <p class="page-subtitle">Rate every item independently. Don't discuss with teammates until everyone has submitted.</p>
        </div>
        <div class="likert-legend">
          <span><strong>0</strong> N/A</span>
          <span><strong>1</strong> Low</span>
          <span><strong>2</strong> Med</span>
          <span><strong>3</strong> High</span>
        </div>
      </div>

      ${renderOptionTabs()}

      <div class="score-toolbar">
        <div class="left">
          <span class="progress-text">Your progress · <strong>${myScoredCount} of ${totalItems}</strong></span>
          <div class="progress-bar"><div class="fill" style="width: ${pct}%"></div></div>
        </div>
        ${submitted
          ? `<span class="badge success"><svg width="12" height="12"><use href="#i-check"/></svg> Submitted</span>`
          : `<span class="badge warning">Not yet submitted</span>`}
      </div>

      <div style="display:grid;grid-template-columns:1fr 280px;gap:20px">
        <div>
          ${CATEGORIES.map(cat => renderScoreSection(cat, optionId, submitted)).join('')}
        </div>
        <div class="activity-card">
          <div class="activity-header">
            <h4>Team activity</h4>
            <p>${scoreSubmittedCountAll()} of ${state.members.length} fully submitted</p>
          </div>
          <div class="activity-list">
            ${state.members.map((m, i) => renderActivityRow(m, i, 'score')).join('')}
          </div>
        </div>
      </div>

      <div class="submit-bar">
        <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap">
          <div class="progress-bar" style="width: 200px"><div class="fill" style="width: ${pct}%"></div></div>
          <span style="font-size: 13px; color: var(--text-secondary);">${myScoredCount} of ${totalItems} items scored ${state.session.mode === 'comparative' ? '(this option)' : ''}</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${submitted
            ? `<button class="btn btn-secondary" id="btn-unsubmit"><svg><use href="#i-edit"/></svg> Unsubmit & edit</button>`
            : `<button class="btn btn-primary btn-lg" id="btn-submit" ${myScoredCount < totalItems ? 'disabled' : ''}>Submit my scores <svg><use href="#i-check"/></svg></button>`}
          ${lead ? `<button class="btn btn-primary btn-lg" id="btn-results" ${!allDone ? 'disabled title="Wait for all members"' : ''}>See results <svg><use href="#i-arrow-right"/></svg></button>` : ''}
        </div>
      </div>
    </div>
  `;
}

function renderScoreSection(cat, optionId, submitted) {
  const items = itemsForOption(optionId, cat);
  if (items.length === 0) return '';
  return `
    <div class="score-section ${cat.toLowerCase()}">
      <div class="score-section-header">
        <div class="swot-header" style="background:none;padding:0;border:none">
          <div class="title-group">
            <div class="icon-circle" style="background:var(--${cat === 'S' ? 'strength' : cat === 'W' ? 'weakness' : cat === 'O' ? 'opportunity' : 'threat'}-bg);color:var(--${cat === 'S' ? 'strength' : cat === 'W' ? 'weakness' : cat === 'O' ? 'opportunity' : 'threat'})">${cat}</div>
            <div>
              <div class="name">${CATEGORY_NAMES[cat]}</div>
              <div class="desc" style="color:var(--text-tertiary)">${items.length} ${items.length === 1 ? 'item' : 'items'} combined</div>
            </div>
          </div>
        </div>
      </div>
      ${items.map(item => {
        const myScore = myScoreFor(item.id);
        return `
          <div class="score-row" data-item="${esc(item.id)}">
            <div class="text">${esc(item.text)}</div>
            <div class="score-segments">
              ${[0,1,2,3].map(n => `
                <button class="score-seg ${myScore === n ? `selected ${cat.toLowerCase()}` : ''}" data-score="${n}" ${submitted ? 'disabled' : ''}>${n}</button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function attachScoreHandlers() {
  attachOptionTabHandlers();

  document.querySelectorAll('.score-seg[data-score]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (btn.disabled) return;
      const row = btn.closest('.score-row');
      const itemId = row.dataset.item;
      const score = parseInt(btn.dataset.score);
      // Optimistic
      const cat = btn.closest('.score-section').classList[1];
      row.querySelectorAll('.score-seg').forEach(b => b.classList.remove('selected', 's', 'w', 'o', 't'));
      btn.classList.add('selected', cat);
      await setScore(itemId, score);
    });
  });

  const submit = document.getElementById('btn-submit');
  if (submit) submit.addEventListener('click', async () => {
    const optionId = state.session.mode === 'comparative' ? state.activeOptionId : 'main';
    await setScoreSubmitted(optionId, true);
    toast('Scores submitted!', 'success');
    // If comparative, auto-advance to next unsubmitted option
    if (state.session.mode === 'comparative') {
      const me = getMyMember();
      const updated = { ...(me?.score_submitted || {}), [optionId]: true };
      const nextOption = state.session.options.find(o => !updated[o.id]);
      if (nextOption) {
        state.activeOptionId = nextOption.id;
        toast(`Now scoring: ${nextOption.name}`, 'info', 2000);
      }
    }
  });

  const unsubmit = document.getElementById('btn-unsubmit');
  if (unsubmit) unsubmit.addEventListener('click', async () => {
    const optionId = state.session.mode === 'comparative' ? state.activeOptionId : 'main';
    await setScoreSubmitted(optionId, false);
  });

  const results = document.getElementById('btn-results');
  if (results) results.addEventListener('click', () => {
    if (confirm('Advance to results? Scoring will be locked.')) advancePhase('results');
  });
}

// ============================================================================
// RESULTS PHASE
// ============================================================================
function renderResults() {
  const lead = isLead();
  const isComparative = state.session.mode === 'comparative';

  if (isComparative) {
    return renderComparativeResults(lead);
  }

  // Binary: single option
  const calc = calculateForOption('main');
  return `
    <div class="content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Analysis complete</h1>
          <p class="page-subtitle">${state.members.length} members · ${calc.totalItems} items · scored on a 0–3 Likert scale</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" id="btn-pdf"><svg><use href="#i-download"/></svg> Download PDF</button>
          ${lead ? `<button class="btn btn-secondary" id="btn-back-to-score">Back to scoring</button>` : ''}
        </div>
      </div>

      ${renderResultsBody(calc, '')}
    </div>
  `;
}

function renderComparativeResults(lead) {
  const calcs = state.session.options.map(o => ({ option: o, calc: calculateForOption(o.id) }));
  const sorted = [...calcs].sort((a, b) => b.calc.recommendation - a.calc.recommendation);
  const winner = sorted[0];
  const active = calcs.find(c => c.option.id === state.activeOptionId) || calcs[0];

  return `
    <div class="content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Comparative analysis</h1>
          <p class="page-subtitle">${state.members.length} members · ${state.session.options.length} options compared</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" id="btn-pdf"><svg><use href="#i-download"/></svg> Download PDF</button>
          ${lead ? `<button class="btn btn-secondary" id="btn-back-to-score">Back to scoring</button>` : ''}
        </div>
      </div>

      <div class="card flush" style="margin-bottom:20px">
        <div class="card-header">
          <div>
            <h3 class="card-title">Ranked comparison</h3>
            <p class="card-subtitle">Top option: <strong>${esc(winner.option.name)}</strong></p>
          </div>
        </div>
        <div style="padding: 0 4px 8px">
          <table class="compare-table">
            <thead>
              <tr><th>Rank</th><th>Option</th><th>Recommendation</th><th>Verdict</th><th>SOWT</th><th>NCV</th><th>Quadrant</th></tr>
            </thead>
            <tbody>
              ${sorted.map((c, i) => {
                const v = VERDICT_INFO[c.calc.verdict];
                const sign = c.calc.recommendation >= 0 ? '+' : '';
                return `
                  <tr ${i === 0 ? 'class="winner"' : ''}>
                    <td class="rank-cell">#${i + 1}</td>
                    <td>${esc(c.option.name)}</td>
                    <td class="num">${sign}${c.calc.recommendation.toFixed(3)}</td>
                    <td class="rec">${v.label}</td>
                    <td class="num">${c.calc.sowt.toFixed(3)}</td>
                    <td class="num">${c.calc.NCV.toFixed(3)}</td>
                    <td class="num">${c.calc.subQuadrant}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <h3 style="font-size:16px;font-weight:700;margin:0 0 12px;letter-spacing:-0.01em">Detail · ${esc(active.option.name)}</h3>
      ${renderOptionTabs()}
      ${renderResultsBody(active.calc, active.option.name)}

      <div style="margin-top:24px">
        <h3 style="font-size:16px;font-weight:700;margin:0 0 12px;letter-spacing:-0.01em">All options on one plot</h3>
        <div class="plot-card">
          ${render2DPlotMulti(calcs)}
        </div>
      </div>
    </div>
  `;
}

function renderResultsBody(calc, optionLabel) {
  const v = VERDICT_INFO[calc.verdict];
  const sign = calc.recommendation >= 0 ? '+' : '';
  const markerPct = ((calc.recommendation + 1) / 2) * 100;
  const sowtSign = calc.sowt >= 0 ? '+' : '';
  const vecSign = calc.vectorScore >= 0 ? '+' : '';
  const vectorContrib = 0.75 * calc.vectorScore;
  const sowtContrib = 0.25 * calc.sowt;
  const verdictDir = calc.verdict.startsWith('yes') ? 'yes' : calc.verdict.startsWith('no') ? 'no' : 'maybe';

  return `
    <div class="rec-card ${calc.verdict}">
      <div class="rec-top">
        <div class="rec-icon ${v.iconClass}"><svg><use href="#${v.icon}"/></svg></div>
        <div class="rec-content">
          <div class="label">${optionLabel ? esc(optionLabel) + ' · Recommendation' : 'Team recommendation'}</div>
          <h2>${esc(v.headline)}</h2>
          <p>${esc(v.desc)}</p>
        </div>
      </div>
      <div class="rec-scale">
        <div class="rec-track">
          <div class="rec-zone no-strong"></div>
          <div class="rec-zone no-lean"></div>
          <div class="rec-zone neutral"></div>
          <div class="rec-zone yes-lean"></div>
          <div class="rec-zone yes-strong"></div>
          <div class="rec-marker" style="left: ${markerPct}%"></div>
        </div>
        <div class="rec-axis">
          <span>Strong No</span><span>Lean No</span><span>Tossup</span><span>Lean Yes</span><span>Strong Yes</span>
        </div>
      </div>
      <div class="rec-formula">
        <div class="score-display">Recommendation score: <span class="${calc.recommendation >= 0 ? 'pos' : 'neg'}">${sign}${calc.recommendation.toFixed(3)}</span></div>
        <div class="breakdown">
          <code>0.75 × vector (${vecSign}${calc.vectorScore.toFixed(3)}) + 0.25 × SOWT (${sowtSign}${calc.sowt.toFixed(3)}) = ${sign}${calc.recommendation.toFixed(3)}</code>
        </div>
      </div>
    </div>

    <div class="input-cards">
      <div class="input-card primary">
        <span class="weight-tag"><svg width="11" height="11"><use href="#i-target"/></svg> Primary signal · 75% weight</span>
        <h3>Consensus vector</h3>
        <p class="desc">Direction (quadrant) shows verdict; magnitude shows team alignment.</p>
        <div class="vector-summary">
          <div class="qbadge ${verdictDir === 'yes' ? 'yes' : verdictDir === 'no' ? 'no' : 'maybe'}">${calc.subQuadrant}</div>
          <div class="vinfo">
            <div class="quadrant-name">Quadrant ${calc.subQuadrant} — ${quadrantLabel(calc.subQuadrant)}</div>
            <div class="vmag">NCV magnitude · <strong>${calc.NCV.toFixed(3)}</strong> · ${ncvLevel(calc.NCV)}</div>
          </div>
        </div>
        <div class="contribution-row">
          <span class="label-text">Contribution to recommendation</span>
          <span class="value-text ${vectorContrib >= 0 ? 'pos' : 'neg'}">${vectorContrib >= 0 ? '+' : ''}${vectorContrib.toFixed(3)}</span>
        </div>
      </div>

      <div class="input-card secondary">
        <span class="weight-tag"><svg width="11" height="11"><use href="#i-info"/></svg> Secondary · 25% weight</span>
        <h3>SOWT index</h3>
        <p class="desc">1D scalar from <code style="font-family:JetBrains Mono;font-size:11px">((S+O) − (W+T)) / 6</code></p>
        <div class="index-display-large">
          <div class="num ${calc.sowt >= 0 ? 'pos' : 'neg'}">${sowtSign}${calc.sowt.toFixed(3)}</div>
          <div class="label">${calc.sowt >= 0 ? 'Net positive' : 'Net negative'}</div>
        </div>
        <div class="contribution-row">
          <span class="label-text">Contribution to recommendation</span>
          <span class="value-text ${sowtContrib >= 0 ? 'pos' : 'neg'}">${sowtContrib >= 0 ? '+' : ''}${sowtContrib.toFixed(3)}</span>
        </div>
      </div>
    </div>

    <div class="plot-card" style="margin-bottom:20px">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap:wrap; gap:8px">
        <div>
          <h3 class="card-title">2D consensus plot</h3>
          <p class="card-subtitle" style="margin-top:2px">Vector magnitude shows team alignment · quadrant shows verdict direction</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <span class="badge ${verdictDir === 'yes' ? 'success' : verdictDir === 'no' ? 'danger' : 'neutral'}">Q${calc.subQuadrant} · ${v.label}</span>
          <span class="badge brand">|C| = ${calc.NCV.toFixed(3)}</span>
        </div>
      </div>
      ${render2DPlot(calc.X, calc.Y, calc.subQuadrant)}
    </div>

    <div style="margin-top: 20px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
        <div>
          <h3 style="font-size: 16px; font-weight: 700; margin: 0; letter-spacing: -0.01em;">Category breakdown</h3>
          <p style="font-size: 13px; color: var(--text-secondary); margin: 2px 0 0;">Mean importance score (0–3) across all team members and items.</p>
        </div>
      </div>
      <div class="metric-cards">
        ${['S', 'W', 'O', 't'].map(c => c.toLowerCase()).map((cat, i) => {
          const labels = ['S', 'W', 'O', 'T'];
          const C = labels[i];
          const val = calc[C];
          const pct = (val / 3) * 100;
          return `
            <div class="metric-card ${cat}">
              <div class="label-row">
                <span class="label">${CATEGORY_NAMES[C]}</span>
                <span class="badge ${cat === 's' ? 'success' : cat === 'w' ? 'warning' : cat === 'o' ? 'brand' : 'danger'}">${C}</span>
              </div>
              <div class="value">${val.toFixed(2)}<span style="font-size:14px;color:var(--text-tertiary);font-weight:500"> / 3</span></div>
              <div class="value-bar"><div class="fill" style="width: ${pct}%"></div></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function quadrantLabel(q) {
  return {
    'I': 'Strong Yes direction',
    'IIa': 'Lean Yes — high strengths but few opportunities',
    'IIb': 'Lean No — high weaknesses outweigh strengths',
    'III': 'Strong No direction',
    'IVa': 'Lean Yes — opportunities outweigh threats',
    'IVb': 'Lean No — threats outweigh opportunities',
  }[q] || q;
}
function ncvLevel(ncv) {
  if (ncv > 0.66) return 'high consensus';
  if (ncv > 0.33) return 'medium consensus';
  return 'low consensus';
}

// PDF GENERATION — one-page summary
// ============================================================================
async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'letter' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const isComp = state.session.mode === 'comparative';

  const calcs = isComp
    ? state.session.options.map(o => ({ option: o, calc: calculateForOption(o.id) }))
    : [{ option: { id: 'main', name: state.session.title }, calc: calculateForOption('main') }];
  const sorted = [...calcs].sort((a, b) => b.calc.recommendation - a.calc.recommendation);
  const top = sorted[0];

  // Header
  doc.setFillColor(51, 88, 255);
  doc.rect(0, 0, pageW, 18, 'F');
  doc.setTextColor(255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('SO-WhaT Analysis Report', margin, 11);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text(new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }), pageW - margin, 11, { align: 'right' });

  // Title block
  doc.setTextColor(11, 20, 48);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  let y = 30;
  doc.text(state.session.title, margin, y);
  y += 7;
  if (state.session.question) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(77, 90, 120);
    const lines = doc.splitTextToSize(state.session.question, pageW - 2 * margin);
    doc.text(lines, margin, y);
    y += lines.length * 5;
  }
  y += 2;

  // Meta line
  doc.setFontSize(9);
  doc.setTextColor(129, 144, 173);
  doc.text(
    `${state.members.length} members · ${isComp ? state.session.options.length + ' options' : 'binary go/no-go'} · session ${state.session.code}`,
    margin, y
  );
  y += 8;

  // Recommendation block
  const v = VERDICT_INFO[top.calc.verdict];
  const recFillColor = top.calc.verdict.startsWith('yes') ? [4, 120, 87] : top.calc.verdict.startsWith('no') ? [190, 18, 60] : [129, 144, 173];
  doc.setFillColor(...recFillColor);
  doc.roundedRect(margin, y, pageW - 2 * margin, 22, 3, 3, 'F');
  doc.setTextColor(255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.text(isComp ? 'TOP-RANKED OPTION' : 'TEAM RECOMMENDATION', margin + 5, y + 6);
  doc.setFontSize(15);
  doc.text(isComp ? `${top.option.name} — ${v.headline}` : v.headline, margin + 5, y + 13);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const sign = top.calc.recommendation >= 0 ? '+' : '';
  doc.text(`Score: ${sign}${top.calc.recommendation.toFixed(3)}   ·   Quadrant ${top.calc.subQuadrant}   ·   NCV ${top.calc.NCV.toFixed(3)}`, margin + 5, y + 19);
  y += 28;

  // Plot + metrics side by side
  const plotSize = 75;
  const plotX = margin;
  const plotY = y;

  // Render plot to canvas
  const plotCanvas = await renderPlotCanvas(isComp ? calcs : [top], 360);
  doc.addImage(plotCanvas, 'PNG', plotX, plotY, plotSize, plotSize);

  // Metrics on right
  const metricsX = plotX + plotSize + 8;
  const metricsW = pageW - metricsX - margin;
  let my = y;
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(11, 20, 48);
  doc.text('Category averages (0–3 Likert)', metricsX, my); my += 5;

  const cats = [
    { k: 'S', name: 'Strengths', color: [4, 120, 87] },
    { k: 'W', name: 'Weaknesses', color: [180, 83, 9] },
    { k: 'O', name: 'Opportunities', color: [3, 105, 161] },
    { k: 'T', name: 'Threats', color: [190, 18, 60] },
  ];
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  for (const c of cats) {
    doc.setFillColor(...c.color);
    doc.rect(metricsX, my - 2.5, 2, 4, 'F');
    doc.setTextColor(11, 20, 48);
    doc.text(c.name, metricsX + 4, my);
    doc.setFont('helvetica', 'bold');
    doc.text(top.calc[c.k].toFixed(2), metricsX + metricsW - 8, my, { align: 'right' });
    doc.setFont('helvetica', 'normal');
    // bar
    const barY = my + 1;
    doc.setFillColor(238, 241, 247);
    doc.roundedRect(metricsX + 4, barY, metricsW - 12, 1.5, 0.5, 0.5, 'F');
    doc.setFillColor(...c.color);
    doc.roundedRect(metricsX + 4, barY, (metricsW - 12) * (top.calc[c.k] / 3), 1.5, 0.5, 0.5, 'F');
    my += 7;
  }

  my += 3;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.text('Math', metricsX, my); my += 5;
  doc.setFont('courier', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(77, 90, 120);
  doc.text(`SOWT = ((S+O)-(W+T))/6 = ${top.calc.sowt >= 0 ? '+' : ''}${top.calc.sowt.toFixed(3)}`, metricsX, my); my += 4;
  doc.text(`X = O-T = ${top.calc.Xraw >= 0 ? '+' : ''}${top.calc.Xraw.toFixed(2)}`, metricsX, my); my += 4;
  doc.text(`Y = S-W = ${top.calc.Yraw >= 0 ? '+' : ''}${top.calc.Yraw.toFixed(2)}`, metricsX, my); my += 4;
  doc.text(`NCV = ${top.calc.NCV.toFixed(3)}`, metricsX, my); my += 4;
  doc.text(`Recommendation = 0.75*vector + 0.25*SOWT`, metricsX, my); my += 4;
  doc.text(`             = ${sign}${top.calc.recommendation.toFixed(3)}`, metricsX, my);

  y = Math.max(y + plotSize, my) + 8;

  // For comparative mode, list options
  if (isComp) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(11, 20, 48);
    doc.text('Ranked options', margin, y); y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    sorted.forEach((c, i) => {
      const sn = c.calc.recommendation >= 0 ? '+' : '';
      doc.setTextColor(51, 88, 255);
      doc.setFont('helvetica', 'bold');
      doc.text(`#${i + 1}`, margin, y);
      doc.setTextColor(11, 20, 48);
      doc.text(c.option.name, margin + 8, y);
      doc.setFont('courier', 'normal');
      doc.setTextColor(77, 90, 120);
      doc.text(`${sn}${c.calc.recommendation.toFixed(3)}`, margin + 70, y);
      doc.setFont('helvetica', 'normal');
      doc.text(`${VERDICT_INFO[c.calc.verdict].label} · Q${c.calc.subQuadrant} · NCV ${c.calc.NCV.toFixed(2)}`, margin + 90, y);
      y += 5;
    });
    y += 4;
  }

  // Team members
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(11, 20, 48);
  doc.text('Team', margin, y); y += 5;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(77, 90, 120);
  const memberNames = state.members.map(m => m.name + (m.user_id === state.session.lead_id ? ' (lead)' : '')).join(', ');
  const memLines = doc.splitTextToSize(memberNames, pageW - 2 * margin);
  doc.text(memLines, margin, y);
  y += memLines.length * 4 + 4;

  // Footer
  doc.setDrawColor(225, 229, 238);
  doc.line(margin, pageH - 14, pageW - margin, pageH - 14);
  doc.setFontSize(8);
  doc.setTextColor(129, 144, 173);
  doc.text('Generated by SO-WhaT Analysis · Method: Solanki, Kennedy & Shirke (ASEE 2022)', margin, pageH - 8);
  doc.text(`Session ${state.session.code}`, pageW - margin, pageH - 8, { align: 'right' });

  const fname = `SOWhaT_${state.session.title.replace(/[^A-Za-z0-9]/g, '_').slice(0, 40)}_${state.session.code}.pdf`;
  doc.save(fname);
  toast('PDF downloaded', 'success');
}

// Render the 2D plot to a canvas for PDF embedding
async function renderPlotCanvas(calcs, sizePx) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = sizePx; canvas.height = sizePx;
    const ctx = canvas.getContext('2d');
    // Background white
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, sizePx, sizePx);
    const cx = sizePx / 2, cy = sizePx / 2;
    const scale = (sizePx / 2 - 20);

    // Quadrant tints
    ctx.fillStyle = 'rgba(209, 250, 229, 0.5)'; // success bg
    ctx.fillRect(cx, 20, sizePx - cx - 20, cy - 20);
    ctx.fillStyle = 'rgba(254, 243, 199, 0.4)'; // warning bg
    ctx.fillRect(20, 20, cx - 20, cy - 20);
    ctx.fillStyle = 'rgba(255, 228, 230, 0.5)'; // danger bg
    ctx.fillRect(20, cy, cx - 20, sizePx - cy - 20);
    ctx.fillStyle = 'rgba(254, 243, 199, 0.4)'; // warning bg
    ctx.fillRect(cx, cy, sizePx - cx - 20, sizePx - cy - 20);

    // Outer frame
    ctx.strokeStyle = '#C9CFDD';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(20, 20, sizePx - 40, sizePx - 40);
    // 0.66 ring
    ctx.strokeRect(cx - 0.66 * scale, cy - 0.66 * scale, 1.32 * scale, 1.32 * scale);
    ctx.setLineDash([3, 3]);
    // 0.33 ring
    ctx.strokeRect(cx - 0.33 * scale, cy - 0.33 * scale, 0.66 * scale, 0.66 * scale);
    ctx.setLineDash([]);

    // Diagonal divider y = -x
    ctx.strokeStyle = 'rgba(129, 144, 173, 0.5)';
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(20, sizePx - 20);
    ctx.lineTo(sizePx - 20, 20);
    ctx.stroke();
    ctx.setLineDash([]);

    // Axes
    ctx.strokeStyle = '#4D5A78';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(20, cy); ctx.lineTo(sizePx - 20, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, 20); ctx.lineTo(cx, sizePx - 20); ctx.stroke();

    // Axis labels
    ctx.fillStyle = '#0369A1'; ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'right'; ctx.fillText('+ O', sizePx - 24, cy - 4);
    ctx.fillStyle = '#BE123C'; ctx.textAlign = 'left'; ctx.fillText('+ T', 24, cy - 4);
    ctx.fillStyle = '#047857'; ctx.textAlign = 'center'; ctx.fillText('+ S', cx, 14);
    ctx.fillStyle = '#B45309'; ctx.fillText('+ W', cx, sizePx - 6);

    // Vectors
    const colors = ['#3358FF', '#B45309', '#047857', '#BE123C', '#0369A1', '#7C3AED', '#DB2777', '#0891B2', '#65A30D', '#EA580C'];
    calcs.forEach((c, i) => {
      const px = cx + c.calc.X * scale;
      const py = cy - c.calc.Y * scale; // y flipped
      const color = calcs.length === 1 ? '#3358FF' : colors[i % colors.length];
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(px, py);
      ctx.stroke();
      // arrowhead
      const angle = Math.atan2(py - cy, px - cx);
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px - 10 * Math.cos(angle - 0.4), py - 10 * Math.sin(angle - 0.4));
      ctx.lineTo(px - 10 * Math.cos(angle + 0.4), py - 10 * Math.sin(angle + 0.4));
      ctx.closePath();
      ctx.fill();
      // endpoint
      ctx.beginPath(); ctx.arc(px, py, 4, 0, 2 * Math.PI); ctx.fill();
      // label for multi
      if (calcs.length > 1) {
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(c.option.name, px + 6, py - 4);
      }
    });
    // origin
    ctx.fillStyle = '#0B1430';
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 2 * Math.PI); ctx.fill();

    resolve(canvas.toDataURL('image/png'));
  });
}

async function boot() {
  // theme
  document.documentElement.dataset.theme = loadTheme();

  // user
  state.user = loadUser();
  if (!state.user) {
    state.user = { id: genId(), name: '' };
    saveUser(state.user);
  }

  // Check for invite link in URL hash (e.g. #join=ABC123)
  const urlJoinCode = getJoinCodeFromUrl();
  state.pendingJoinCode = urlJoinCode;
  if (urlJoinCode && window.history && window.history.replaceState) {
    // Clean the URL so a refresh doesn't re-trigger join logic
    window.history.replaceState(null, '', window.location.pathname + window.location.search);
  }

  // Config: PRECONFIGURED takes priority, then localStorage, then config screen
  if (isPreconfigured()) {
    state.config = { url: https://jofuhorotcybnvdwcwkn.supabase.co, anonKey: sb_publishable_1m_G76YHwL9WrfeVuoImbw_bk39jhZ1
 };
  } else {
    state.config = loadConfig();
    if (!state.config) {
      state.view = 'config';
      render();
      return;
    }
  }

  // try to connect
  const ok = await initSupabase();
  if (!ok) {
    if (isPreconfigured()) {
      // Stuck — the file ships with bad credentials. Show a message but don't
      // dump the user into a config screen they can't fix from the UI.
      toast('Could not connect with the credentials baked into this file. Check the PRECONFIGURED block in the HTML.', 'error', 10000);
      state.view = 'setup';
    } else {
      state.view = 'config';
    }
    render();
    return;
  }

  // Resume an active session — but if the URL invite is for a *different*
  // session, drop the old one so the user can join the new one.
  const cur = getCurrent();
  if (urlJoinCode && cur && cur.code !== urlJoinCode) {
    setCurrent(null);
  } else if (cur && cur.code) {
    try {
      const { data: session } = await state.supabase
        .from('sessions').select('*').eq('code', cur.code).maybeSingle();
      if (session) {
        await loadSessionData(session.id);
        // if member is no longer in member list, re-add (in case they cleared LS but not session)
        if (!getMyMember() && state.user.name) {
          await state.supabase.from('members').upsert({
            session_id: session.id, user_id: state.user.id, name: state.user.name,
            last_seen: new Date().toISOString(),
          }, { onConflict: 'session_id,user_id' });
          await loadSessionData(session.id);
        }
        if (getMyMember()) {
          subscribeRealtime(session.id);
          startHeartbeat();
          syncViewToPhase();
          state.pendingJoinCode = null;  // already in a session
          render();
          return;
        }
      }
    } catch (e) {
      console.warn('resume failed', e);
    }
    setCurrent(null);
  }

  state.view = 'setup';
  render();
}

// auto-rerender every 30s to update "joined X min ago" and online status
setInterval(() => {
  if (state.session) render();
}, 30000);

document.addEventListener('DOMContentLoaded', boot);

// ============================================================================
</script>

</body>
</html>
